# ── Deploy: staging → smoke → manual approve → production ──
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback-staging
          - rollback-production

jobs:
  # ── 4. Deploy to staging ───────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/yurdelo
            BACKEND_IMAGE=yurdelo-backend

            # Save current tag for rollback (persistent path, not /tmp)
            CURRENT=$(docker inspect --format='{{.Config.Image}}' $BACKEND_IMAGE 2>/dev/null | grep -oP ':\K.*' || echo "none")
            echo "$CURRENT" > .last-staging-tag
            echo "Previous tag: $CURRENT"

            git fetch origin main
            git reset --hard origin/main

            # Write .env — heredoc without indentation
            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
            MIGRATION_DATABASE_URL=${{ secrets.STAGING_MIGRATION_DATABASE_URL }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_REGION=${{ secrets.S3_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            NODE_ENV=production
            PORT=3000
            POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # Build FIRST → migrate with NEW image → then start
            docker compose -f infra/docker-compose.prod.yml build
            docker compose -f infra/docker-compose.prod.yml run --rm backend \
              npx node-pg-migrate up \
                --database-url-var MIGRATION_DATABASE_URL \
                --migrations-dir db/migrations \
                --migration-file-language sql
            docker compose -f infra/docker-compose.prod.yml up -d

            echo "Staging deployed"

  # ── 5. Smoke tests ────────────────────────────────────
  smoke-staging:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging  # needed to access STAGING_HOST secret
    steps:
      - name: Wait for startup
        run: sleep 10

      - name: Health check (5 retries)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.STAGING_HOST }}/health" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "OK" && exit 0
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Verify API structure
        run: |
          RESP=$(curl -sf "https://${{ secrets.STAGING_HOST }}/health")
          echo "$RESP"
          echo "$RESP" | grep -q '"status":"ok"'
          echo "$RESP" | grep -q '"db":"connected"'
          echo "$RESP" | grep -q '"redis":"connected"'

  # ── 6+7. Manual approve → Deploy production ────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment: production  # ← manual approval required
    if: >
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/yurdelo
            BACKEND_IMAGE=yurdelo-backend

            # Save current tag for rollback
            CURRENT=$(docker inspect --format='{{.Config.Image}}' $BACKEND_IMAGE 2>/dev/null | grep -oP ':\K.*' || echo "none")
            echo "$CURRENT" > .last-production-tag

            git fetch origin main
            git reset --hard origin/main

            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            MIGRATION_DATABASE_URL=${{ secrets.PROD_MIGRATION_DATABASE_URL }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_REGION=${{ secrets.S3_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            NODE_ENV=production
            PORT=3000
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # 8. Build → Migrate → Deploy
            docker compose -f infra/docker-compose.prod.yml build
            docker compose -f infra/docker-compose.prod.yml run --rm backend \
              npx node-pg-migrate up \
                --database-url-var MIGRATION_DATABASE_URL \
                --migrations-dir db/migrations \
                --migration-file-language sql
            docker compose -f infra/docker-compose.prod.yml up -d --no-deps backend

            # Auto-rollback if health fails
            sleep 5
            if ! curl -sf http://localhost:3000/health > /dev/null; then
              echo "HEALTH FAILED — AUTO ROLLBACK"
              if [ -f .last-production-tag ] && [ "$(cat .last-production-tag)" != "none" ]; then
                PREV=$(cat .last-production-tag)
                docker tag "$BACKEND_IMAGE:$PREV" "$BACKEND_IMAGE:current" 2>/dev/null || true
                docker compose -f infra/docker-compose.prod.yml up -d --no-deps backend
                echo "Rolled back to: $PREV"
              fi
              exit 1
            fi
            echo "Production deployed"

      - name: External health verification
        run: |
          sleep 5
          curl -sf "https://${{ secrets.PRODUCTION_HOST }}/health" | grep -q '"status":"ok"'

  # ── Rollback: staging ──────────────────────────────────
  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback-staging'
    environment: staging
    steps:
      - name: Rollback staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/yurdelo
            BACKEND_IMAGE=yurdelo-backend

            [ ! -f .last-staging-tag ] || [ "$(cat .last-staging-tag)" = "none" ] && {
              echo "No previous tag"; exit 1
            }

            PREV=$(cat .last-staging-tag)
            echo "Rolling back to: $PREV"

            docker compose -f infra/docker-compose.prod.yml stop backend
            docker tag "$BACKEND_IMAGE:$PREV" "$BACKEND_IMAGE:current" 2>/dev/null || true
            docker compose -f infra/docker-compose.prod.yml up -d backend

            docker compose -f infra/docker-compose.prod.yml run --rm backend \
              npx node-pg-migrate down \
                --database-url-var MIGRATION_DATABASE_URL \
                --migrations-dir db/migrations \
                --migration-file-language sql

            sleep 5
            curl -sf http://localhost:3000/health && echo "Rollback OK" || echo "Rollback FAILED"

  # ── Rollback: production ───────────────────────────────
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback-production'
    environment: production
    steps:
      - name: Rollback production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/yurdelo
            BACKEND_IMAGE=yurdelo-backend

            [ ! -f .last-production-tag ] || [ "$(cat .last-production-tag)" = "none" ] && {
              echo "No previous tag"; exit 1
            }

            PREV=$(cat .last-production-tag)
            echo "Rolling back to: $PREV"

            docker compose -f infra/docker-compose.prod.yml stop backend
            docker tag "$BACKEND_IMAGE:$PREV" "$BACKEND_IMAGE:current" 2>/dev/null || true
            docker compose -f infra/docker-compose.prod.yml up -d backend

            # Prod migration rollback is manual — too dangerous to automate
            echo "WARNING: Run migration rollback manually if needed"

            sleep 5
            curl -sf http://localhost:3000/health && echo "Rollback OK" || echo "Rollback FAILED"
