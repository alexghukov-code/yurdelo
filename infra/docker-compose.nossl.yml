# ── Production без SSL (доступ по IP, без домена) ────────
# Использование:
#   cd infra
#   docker compose -f docker-compose.nossl.yml build
#   docker compose -f docker-compose.nossl.yml up -d
#
# При появлении домена — переключиться на docker-compose.prod.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: yurdelo-postgres
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: yurdelo
      POSTGRES_USER: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yurdelo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: yurdelo-redis
    restart: always
    env_file:
      - ../.env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: yurdelo-backend
    restart: always
    expose:
      - "3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 3s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend-build:
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: yurdelo-frontend-build
    entrypoint: ["cp", "-r", "/usr/share/frontend/.", "/output/"]
    command: []
    volumes:
      - frontend_dist:/output

  nginx:
    image: nginx:alpine
    container_name: yurdelo-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.nossl.conf:/etc/nginx/conf.d/default.conf
      - frontend_dist:/usr/share/frontend:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redisdata:
  frontend_dist:
