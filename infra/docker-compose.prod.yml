# ── Production: built images, nginx SSL, healthchecks ──
services:
  postgres:
    image: postgres:16-alpine
    container_name: yurdelo-postgres
    restart: always
    environment:
      POSTGRES_DB: yurdelo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yurdelo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yurdelo-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: yurdelo-backend
    restart: always
    expose:
      - "3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Frontend build stage — copies built static files to shared volume, then exits
  frontend-build:
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: yurdelo-frontend-build
    entrypoint: ["cp", "-r", "/usr/share/frontend/.", "/output/"]
    command: []
    volumes:
      - frontend_dist:/output

  nginx:
    image: nginx:alpine
    container_name: yurdelo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/frontend:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # Optional: certbot for auto-renewal
  certbot:
    image: certbot/certbot
    container_name: yurdelo-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  frontend_dist:
  certbot_www:
