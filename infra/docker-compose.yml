# ── Development: hot reload, ports exposed, no SSL ─────
services:
  postgres:
    image: postgres:16-alpine
    container_name: yurdelo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yurdelo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yurdelo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yurdelo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: yurdelo-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      REDIS_PASSWORD: ""
      DATABASE_URL: postgres://app_user:app_password@postgres:5432/yurdelo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../packages/backend:/app/packages/backend
      - ../packages/shared:/app/packages/shared
      - backend_modules:/app/node_modules
    command: >
      sh -c "npm ci --workspace=packages/shared --workspace=packages/backend --ignore-scripts 2>/dev/null
             && npx tsx watch packages/backend/src/server.ts"

  frontend:
    image: node:20-alpine
    container_name: yurdelo-frontend-dev
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../packages/frontend:/app/packages/frontend
      - ../packages/shared:/app/packages/shared
      - frontend_modules:/app/node_modules
    command: >
      sh -c "npm ci --workspace=packages/shared --workspace=packages/frontend --ignore-scripts 2>/dev/null
             && cd packages/frontend && npx vite --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:alpine
    container_name: yurdelo-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  backend_modules:
  frontend_modules:
